services:
  - type: web
    name: opensquad-service
    runtime: node
    nodeVersion: "20"
    plan: starter
    rootDir: opensquad-service
    buildCommand: bash build.sh
    startCommand: node src/server.js
    envVars:
      - key: PATH_OPENSQUAD
        value: ./opensquad
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "3000"
    healthCheckPath: /health
    healthCheckTimeout: 30
    healthCheckInterval: 10
