services:
  - type: web
    name: faroll-publici
    runtime: node
    plan: starter          # Starter ($7/mês) — necessário para disco persistente
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # node:sqlite (DatabaseSync) exige Node >= 22.5; sem isto o processo morre antes do listen → 502
      - key: NODE_VERSION
        value: "22.12.0"
      # PORT é definido automaticamente pelo Render — não fixar aqui (evita conflito com o proxy)
      - key: ENCRYPTION_KEY
        generateValue: true  # Render gera automaticamente
      - key: DB_PATH
        value: /data/faroll.db
    disk:
      name: faroll-data
      mountPath: /data
      sizeGB: 1
