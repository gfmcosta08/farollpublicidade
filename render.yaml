# Blueprint Render — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: publi-opensquad-api
    runtime: node
    plan: free
    region: oregon
    rootDir: opensquad-service
    buildCommand: |
      npm install
      if [ ! -d opensquad ]; then git clone https://github.com/renatoasse/opensquad.git opensquad; fi
      cd opensquad && npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PATH_OPENSQUAD
        value: ./opensquad
      - key: OPENAI_API_KEY
        sync: false
