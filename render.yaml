# Blueprint Render — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: publi-opensquad-api
    runtime: node
    plan: free
    region: oregon
    rootDir: opensquad-service
    buildCommand: bash build.sh
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PATH_OPENSQUAD
        value: ./opensquad
      - key: OPENAI_API_KEY
        sync: false
